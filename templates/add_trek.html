<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Trek - Trekking Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    {% extends "base.html" %}
    {% block title %}Login - Trekking Management{% endblock %}
    {% block content %}
    <div class="container" style="max-width: 500px; margin-top: 60px;">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title mb-4">Add New Trek</h3>

                <form method="POST" action="{{ url_for('add_trek') }}">
                    <div class="mb-3">
                        <label class="form-label">Trek Name</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Location</label>
                        <input type="text" name="location" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Difficulty</label>
                        <select name="difficulty" class="form-select" required>
                            <option value="Easy">Easy</option>
                            <option value="Moderate">Moderate</option>
                            <option value="Hard">Hard</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Duration (days)</label>
                        <input type="number" name="duration_days" class="form-control" min="1" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Available Slots</label>
                        <input type="number" name="available_slots" class="form-control" min="1" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Start Date</label>
                        <input type="date" name="start_date" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">End Date</label>
                        <input type="date" name="end_date" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Create Trek</button>
                </form>

                <p class="text-center mt-3 mb-0">
                    <a href="{{ url_for('manage_treks') }}">Back to Trek List</a>
                </p>
            </div>
        </div>
    </div>
    {% endblock %}
    
</body>
</html>
