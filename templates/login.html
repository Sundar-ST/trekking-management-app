{% extends "base.html" %}
{% block title %}Login - Trekking Management{% endblock %}
{% block content %}
    <div class="container" style="max-width: 400px; margin-top: 80px;">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">Trekking Management</h3>

                {% if error %}
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        {{ error }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endif %}

                <form method="POST" action="{{url_for('login')}}">
                    <div class="mb-3">
                        <label class="form-label">Login as</label>
                        <select name="role" class="form-select" required>
                            <option value="staff">Trek Staff</option>
                            <option value="user">User (Trekker)</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="text" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="text" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>

                <p class="text-center mt-3 mb-0">
                    New staff or trekker? <a href="{{url_for('register')}}">Register here</a>
                </p>
            </div>
        </div>
    </div>
{% endblock %}
