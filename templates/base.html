<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Trekking Management{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    {% if session.get('role') %}
    <nav class="navbar navbar-expand navbar-dark bg-dark px-3">
        <a class="navbar-brand" href="#">Trekking Management</a>
        <div class="navbar-nav me-auto">
            {% if session['role'] == 'admin' %}
                <a class="nav-link" href="{{ url_for('admin_dashboard') }}">Dashboard</a>
                <a class="nav-link" href="{{ url_for('manage_treks') }}">Treks</a>
                <a class="nav-link" href="{{ url_for('manage_users') }}">Users</a>
            {% elif session['role'] == 'staff' %}
                <a class="nav-link" href="{{ url_for('staff_dashboard') }}">My Treks</a>
            {% elif session['role'] == 'user' %}
                <a class="nav-link" href="{{ url_for('user_dashboard') }}">Available Treks</a>
            {% endif %}
        </div>
        <span class="navbar-text text-light me-3">{{ session.get('name') }}</span>
        <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">Logout</a>
    </nav>
    {% endif %}

    {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
