<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assign Staff - Trekking Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container" style="max-width: 500px; margin-top: 60px;">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title mb-1">Assign Staff</h3>
                <p class="text-muted mb-4">Trek: {{ trek.name }} ({{ trek.location }})</p>

                {% if approved_staff|length == 0 %}
                    <p class="text-danger">No approved staff available. Approve a staff member first.</p>
                {% else %}
                    <form method="POST" action="{{ url_for('assign_staff', trek_id=trek.trek_id) }}">
                        <div class="mb-3">
                            <label class="form-label">Assign to Staff</label>
                            <select name="staff_id" class="form-select" required>
                                {% for s in approved_staff %}
                                    <option value="{{ s.staff_id }}"
                                        {% if trek.assigned_staff_id == s.staff_id %}selected{% endif %}>
                                        {{ s.name }} ({{ s.email }})
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Trek Status</label>
                            <select name="status" class="form-select" required>
                                {% for st in ['Pending', 'Approved', 'Open', 'Closed', 'Completed'] %}
                                    <option value="{{ st }}" {% if trek.status == st %}selected{% endif %}>{{ st }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Save</button>
                    </form>
                {% endif %}

                <p class="text-center mt-3 mb-0">
                    <a href="{{ url_for('manage_treks') }}">Back to Trek List</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
